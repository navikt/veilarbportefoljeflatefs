name: Install, build, run Cypress on PR

on: pull_request

jobs:
  cypress-run:
    name: Install, build, run Cypress tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://npm.pkg.github.com"
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build application
        run: npm run build:mock
      - name: Run tests
        run: npm run test:ci
      - name: Cypress run
        uses: cypress-io/github-action@4c06c48f3ffea349b7189aa06dfcda47a9fa7b92 # ratchet:cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          start: npm start
          wait-on: http://localhost:5173
          wait-on-timeout: 90
          record: false
      - name: Upload screenshots
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # ratchet:actions/upload-artifact@v7.0.0
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
