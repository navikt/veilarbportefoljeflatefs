name: Install, build, run Cypress on PR

on: pull_request

jobs:
  cypress-run:
    name: Install, build, run Cypress tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://npm.pkg.github.com"
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build application
        run: npm run build:mock
      - name: Run tests
        run: npm run test:ci
      - name: Cypress run
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f # ratchet:cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          start: npm start
          wait-on: http://localhost:5173
          wait-on-timeout: 90
          record: false
      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
