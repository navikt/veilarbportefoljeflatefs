name: Install, build, run Cypress on PR

on: pull_request

jobs:
  cypress-run:
    name: Install, build, run Cypress tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # ratchet:actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://npm.pkg.github.com"
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
      - name: Build application
        run: npm run build:mock
      - name: Run tests
        run: npm run test:ci
      - name: Cypress run
        uses: cypress-io/github-action@fa4a118725a8f001170d49631ea89e5d66fee626 # ratchet:cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          start: npm start
          wait-on: http://localhost:5173
          wait-on-timeout: 90
          record: false
      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
