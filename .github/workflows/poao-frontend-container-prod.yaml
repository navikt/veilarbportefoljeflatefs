name: paoa frontend container prod

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/poao-frontend-container-prod.yaml"
      - ".nais/obo-nais-prod.yaml"
  workflow_dispatch:

concurrency:
  group: pto_frontend_container_prod
  cancel-in-progress: true

env:
  APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY_GCP }}

jobs:
  deploy-prod:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # ratchet:actions/checkout@v6
      - name: deploy gcp prod
        uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb # ratchet:nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-gcp
          RESOURCE: .nais/obo-nais-prod.yaml
